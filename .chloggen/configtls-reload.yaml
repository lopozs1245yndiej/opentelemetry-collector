# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, e.g. receiver/prometheus, or cmd/mdatagen
component: config/configtls

# A brief description of the change. Surround your text with quotes ("...") if it needs to start with a backtick (`)
note: Add support for reloading TLS certificates without restarting the collector

# One or more tracking issues related to the change
issues: [9583]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the changelog.
# Use pipe (|) for multiline entries.
subtext: |
  Introduces a new `ReloadInterval` field in `TLSSetting` that allows
  TLS certificates to be automatically reloaded at the specified interval.
  This is useful for environments where certificates are rotated frequently,
  such as those using cert-manager or Vault PKI.
