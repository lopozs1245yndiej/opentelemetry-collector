# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, e.g. receiver/prometheus
component: confighttp

# A brief description of the change. Surround your text with quotes ("...") if it needs to start with a backtick (`)
note: Add support for configuring compression algorithms in HTTP exporters and receivers

# One or more tracking issues related to the change
issues: [9673]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the changelog.
# Use pipe (|) for multiline entries.
subtext: |
  Adds `compression` field to `confighttp.HTTPClientSettings` and `confighttp.HTTPServerSettings`
  to allow configuring supported compression algorithms (gzip, zstd, snappy, zlib, deflate).
  This enables fine-grained control over which compression methods are advertised and accepted.
