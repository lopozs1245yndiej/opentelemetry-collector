# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, e.g. receiver/prometheus
component: confighttp

# A brief description of the change. Surpasses the 50-character git commit message limit.
short_description: Add support for custom headers in HTTP client configuration

# One or more tracking issues related to the change
issues: [9267]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the changelog.
# Use pipe (|) for multiline entries.
additional_details: |
  Adds a new `headers` field to `HTTPClientSettings` that allows users to specify
  custom HTTP headers to be included in all outgoing requests. This is useful for
  authentication tokens, custom metadata, or any other headers required by the
  receiving endpoint.
